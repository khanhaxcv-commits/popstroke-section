<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>PopStroke Slider</title>
  <link href="/assets/CmvYZIef-style.css" rel="stylesheet" />
  <style>
    #popstrokeSlider [role="tab"] {
      color: var(--colors-surface-on);
    }

    #popstrokeSlider [role="tab"]._tabActive_qxh0t_56 {
      opacity: 1;
    }

    #popstrokeSlider [role="tab"]._tabActive_qxh0t_56 ._tabProgress_qxh0t_56 {
      background-color: color-mix(in srgb,
          var(--colors-surface-on) 20%,
          transparent);
    }

    #popstrokeSlider [role="tab"]._tabActive_qxh0t_56 ._tabProgressLevel_qxh0t_88 {
      background-color: var(--colors-surface-on);
    }
  </style>
</head>

<body lang="en">
  <div style="padding: 20px;">
    <section
      class="d_grid grid-g_1rem lrg:grid-g_3rem xlrg:grid-g_6rem lrg:grid-tc_1fr_1fr lrg:w_100% max-w_100rem _autoAdvance_qxh0t_1"
      id="popstrokeSlider" style="--slideDuration:5000ms">
      <div class="asp_6/7 bdr_1rem d_flex flex-d_row flex-wrap_nowrap max-h_440px lrg:max-h_880px ov_hidden"
        data-slider-media=""></div>
      <div class="d_grid grid-tr_auto_auto">
        <div class="d_flex lrg:flex-d_column lrg:jc_center ai_start gap_1.4rem_1rem" data-slider-tabs="" role="tablist">
        </div>
        <div class="d_flex flex-d_row flex-wrap max-w_32rem lrg:max-w_28rem py_2rem lrg:py_3rem ov_hidden pos_relative"
          data-slider-panels="">
          <div
            class="d_block bg-i_none lrg:bg-i_linear-gradient(var(--colors-surface)_0%,_transparent_3rem_calc(100%_-_3rem),_var(--colors-surface)_100%); pos_absolute top_0 left_0 w_100% h_100%"
            data-slider-overlay=""></div>
        </div>
      </div>
    </section>
  </div>
  <script>
    const POPSTROKE_CONTENT = [
      {
        tab: 'eat.',
        image: '/media/im7c8qyviqf4/2EYZ5LJaNhMLcZRchtsGYg/c1312331e46bd99c86a82ac06fc1721f/0-eat.jpg?w=1520&h=1770&q=90&fit=fill',
        alt: 'A plate of tacos and a drink on a table outdoors.',
        content: [
          'Hungry for more than bragging rights? Fuel up at our full-service restaurant, where every bite is made from scratch and packed with flavor. From shareable appetizers that disappear fast to crispy chicken, fresh salads and smashburgers worth talking about. We’ve got something tasty for every craving.',
          'Don’t forget to save room for dessert. Our ice cream parlor and over-the-top milkshakes are irresistible. Don’t say we didn’t warn you.'
        ]
      },
      {
        tab: 'putt.',
        image: '/media/im7c8qyviqf4/3aDPuOtqnWlkS5gtWsemNV/5d5c1b23c70d7cadce028cf80a487e4e/1-putt.jpg?w=1520&h=1770&q=90&fit=fill',
        alt: 'A woman standing on a golf course, holding a golf club after taking a swing.',
        content: [
          'Step onto the greens and into the game. Our 18-hole putting courses aren’t your average backyard mini-golf setups, they’re designed to test your skills and stir up a little friendly competition. With smooth synthetic fairways, sneaky bunkers, and unpredictable breaks, every round keeps you on your toes.'
        ]
      },
      {
        tab: 'drink.',
        image: '/media/im7c8qyviqf4/FaORaunILB0CpwwIlaFpy/e1e37a3d4b7cc979148251d9a1fae243/Drinks__1_.jpg?w=1296&h=1296&q=90&fit=fill',
        alt: 'A glass holding an iced tea cocktail with a lemon slice in front of a golf club.',
        content: [
          'Grab a cold one and settle in at our lively sports bar, the perfect spot to catch the latest game or celebrate that clutch hole-in-one. With craft beers, premium spirits, and cocktails mixed to perfection, every sip goes down as smooth as your best putt.',
          'Order straight from our app and get drinks delivered right to you on the course, because at PopStroke, the party doesn’t have to stop.'
        ]
      }
    ];

    (() => {
      const slider = document.getElementById('popstrokeSlider');
      const media = slider?.querySelector('[data-slider-media]');
      const tabList = slider?.querySelector('[data-slider-tabs]');
      const panelsWrap = slider?.querySelector('[data-slider-panels]');
      const overlay = slider?.querySelector('[data-slider-overlay]');

      if (
        !slider ||
        !media ||
        !tabList ||
        !panelsWrap ||
        !POPSTROKE_CONTENT.length
      ) {
        return;
      }

      const classes = {
        auto: '_autoAdvance_qxh0t_1',
        manual: '_manualAdvance_qxh0t_5',
        heroActive: '_heroActive_qxh0t_1',
        panelActive: '_panelActive_qxh0t_28',
        tabActive: '_tabActive_qxh0t_56'
      };

      const heroClass =
        'flex_0_0_100% ov_hidden trf_translateX(100%) ' +
        '--activeX_calc(var(--index)_*_-100%) ' +
        '--inX_calc(var(--activeX)_+_100%) ' +
        'lrg:--inX_var(--activeX) --inY_0 lrg:--inY_100% ' +
        '--outX_calc(var(--activeX)_-_100%) ' +
        'lrg:--outX_var(--activeX) --outY_0 lrg:--outY_-100% ' +
        '[&_img]:w_100% [&_img]:h_105% [&_img]:obj-f_cover';

      const tabClass =
        'op_0.5 d_flex flex-d_column ai_center cursor_pointer ' +
        'trs-prop_opacity trs-dur_200ms trs-tmf_easeQuad hover:op_1 ' +
        'textStyle_body.4 sml:textStyle_body.3 lrg:textStyle_body.2 ' +
        'xlrg:textStyle_body.1 tt_capitalize';

      const progressClass =
        'bg-c_surface.on/20 d_block h_5px w_0 _tabProgress_qxh0t_56';

      const progressLevelClass =
        'bg-c_surface.on d_block h_100% op_1 _tabProgressLevel_qxh0t_88';

      const panelClass =
        'flex_0_0_100% trf_translateX(100%) ' +
        '--activeX_calc(var(--index)_*_-100%) ' +
        '--inX_calc(var(--activeX)_+_100%) ' +
        'lrg:--inX_var(--activeX) --inY_0 lrg:--inY_30% ' +
        '--outX_calc(var(--activeX)_-_100%) ' +
        'lrg:--outX_var(--activeX) --outY_0 lrg:--outY_-30%';

      const duration =
        Number.parseInt(
          slider.style.getPropertyValue('--slideDuration'),
          10
        ) || 5000;

      const advanceDelay = duration * 0.9;

      const createElement = (tag, options = {}) => {
        const element = document.createElement(tag);
        Object.assign(element, options);
        return element;
      };

      POPSTROKE_CONTENT.forEach((item, index) => {
        const hero = createElement('div', {
          className: heroClass
        });

        hero.style.setProperty('--index', index);

        const picture = createElement('picture');

        const image = createElement('img', {
          src: item.image,
          alt: item.alt || '',
          width: 1520,
          height: 1770,
          decoding: 'async',
          loading: index === 0 ? 'eager' : 'lazy'
        });

        picture.append(image);
        hero.append(picture);
        media.append(hero);

        const tab = createElement('button', {
          id: `popstroke-tab-${index}`,
          type: 'button',
          role: 'tab',
          className: tabClass
        });

        tab.setAttribute(
          'aria-controls',
          `popstroke-panel-${index}`
        );

        tab.append(document.createTextNode(item.tab));

        const progress = createElement('span', {
          className: progressClass
        });

        progress.append(
          createElement('span', {
            className: progressLevelClass
          })
        );

        tab.append(progress);
        tabList.append(tab);

        const panel = createElement('div', {
          id: `popstroke-panel-${index}`,
          role: 'tabpanel',
          className: panelClass
        });

        panel.style.setProperty('--index', index);
        panel.setAttribute('aria-labelledby', tab.id);

        item.content.forEach((text, paragraphIndex) => {
          panel.append(
            createElement('p', {
              className:
                paragraphIndex < item.content.length - 1
                  ? 'pb_fluid-2'
                  : '',
              textContent: text
            })
          );
        });

        panelsWrap.insertBefore(panel, overlay || null);
      });

      const heroes = [...media.children];
      const tabs = [...tabList.querySelectorAll('[role="tab"]')];
      const panels = [
        ...panelsWrap.querySelectorAll('[role="tabpanel"]')
      ];

      let activeWindow = [0];
      let hasInteraction = false;
      let timer = null;

      const getActiveIndex = () => activeWindow.at(-1) ?? 0;

      const getNextIndex = index =>
        (index + 1) % POPSTROKE_CONTENT.length;

      const render = () => {
        const activeIndex = getActiveIndex();
        const visibleIndexes = new Set(activeWindow);

        slider.classList.toggle(
          classes.auto,
          !hasInteraction
        );

        slider.classList.toggle(
          classes.manual,
          hasInteraction
        );

        heroes.forEach((hero, index) => {
          hero.classList.toggle(
            classes.heroActive,
            visibleIndexes.has(index)
          );
        });

        panels.forEach((panel, index) => {
          const isActive = index === activeIndex;

          panel.classList.toggle(
            classes.panelActive,
            visibleIndexes.has(index)
          );

          panel.setAttribute(
            'aria-current',
            String(isActive)
          );

          panel.setAttribute(
            'aria-hidden',
            String(!isActive)
          );
        });

        tabs.forEach((tab, index) => {
          const isActive = index === activeIndex;

          tab.classList.toggle(
            classes.tabActive,
            isActive
          );

          tab.setAttribute(
            'aria-selected',
            String(isActive)
          );

          tab.tabIndex = isActive ? 0 : -1;
        });
      };

      const stopAutoPlay = () => {
        if (timer !== null) {
          window.clearInterval(timer);
          timer = null;
        }
      };

      const selectSlide = index => {
        if (
          index < 0 ||
          index >= POPSTROKE_CONTENT.length
        ) {
          return;
        }

        hasInteraction = true;
        activeWindow = [index];

        stopAutoPlay();
        render();
      };

      tabs.forEach((tab, index) => {
        tab.addEventListener('click', () => {
          selectSlide(index);
        });

        tab.addEventListener('keydown', event => {
          const current = getActiveIndex();

          const keyMap = {
            Home: 0,
            End: tabs.length - 1,
            ArrowLeft:
              (current - 1 + tabs.length) % tabs.length,
            ArrowUp:
              (current - 1 + tabs.length) % tabs.length,
            ArrowRight: getNextIndex(current),
            ArrowDown: getNextIndex(current)
          };

          if (!(event.key in keyMap)) {
            return;
          }

          event.preventDefault();

          const next = keyMap[event.key];

          tabs[next].focus();
          selectSlide(next);
        });
      });

      render();

      if (POPSTROKE_CONTENT.length > 1) {
        timer = window.setInterval(() => {
          activeWindow = [
            ...activeWindow,
            getNextIndex(getActiveIndex())
          ].slice(-2);

          render();
        }, advanceDelay);
      }
    })();
  </script>
</body>

</html>
